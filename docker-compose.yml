services:
  shogun:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shogun-v2
    image: mas-secure:latest
    stdin_open: true
    tty: true
    restart: unless-stopped

    volumes:
      # プロジェクトファイル（コンテナ専用・Windows側から不可視）
      - shogun-workspace:/workspace

      # Claude Code 設定の永続化（再起動後も認証維持）
      - shogun-claude-config:/home/shogun/.claude

      # 殿の差し入れ専用（読み取り専用）
      - type: bind
        source: C:\intel
        target: /intel
        read_only: true

    environment:
      TZ: Asia/Tokyo
      LANG: ja_JP.UTF-8

    security_opt:
      - no-new-privileges:true

volumes:
  shogun-workspace:
    name: shogun-workspace
  shogun-claude-config:
    name: shogun-claude-config
