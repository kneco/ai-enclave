services:
  enclave:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-enclave
    image: ai-enclave:latest
    stdin_open: true
    tty: true
    restart: unless-stopped

    ports:
      - "8080:8080"

    volumes:
      # Project files (container-only, invisible from host)
      - enclave-workspace:/workspace

      # Claude Code config persistence (auth survives restart)
      - enclave-claude-config:/home/agent/.claude

      # Read-only data input from host
      - type: bind
        source: /mnt/c/intel
        target: /intel
        read_only: true

    environment:
      TZ: Asia/Tokyo
      LANG: ja_JP.UTF-8

    security_opt:
      - no-new-privileges:true

volumes:
  enclave-workspace:
    name: enclave-workspace
  enclave-claude-config:
    name: enclave-claude-config
